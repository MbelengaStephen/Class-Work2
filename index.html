<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Form</title>
  <!-- BootStrap Css -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
  <!-- BootStrap JS -->
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
</head>

<body>
  <!-- Header Section -->
<img class="image" src="images/jkuat-logo.png" alt="jkuat-logo">
<label class="passport">
    <textarea rows="10" cols="33">
       please affix passport photograph
    </textarea>
</label>
  <section class="container-fluid">
    <h1>1. Contact Information.</h1>
    <div>
      <label>Surname:
        <input type="text">
      </label>
    </div>
    <br>
    <div class="o-name">
      <label> Other name:
        <input type="text">
      </label>
    </div>
    <br>
    <div>
      <label class="title">Title(Mr/Mrs):
        <input type="text">
      </label>
    </div>
    <br>
    <div>
      <label class="gender">Gender:
        <input type="text">
      </label>
    </div>
    <br>
    <div>
      <label class="guardian">Parent/Guardian name:
        <input type="text" size="60">
      </label>
    </div>
    <br>
    <div>
      <label class="permanent">Permanent Address:
        <input type="text" size="60">
      </label>
    </div>
    <br>
    <div>
      <label class="address">Contact Address:
        <input type="text" size="60">
      </label>
    </div>
    <div>
      <label class="phone">Phone No:
        <input type="text">
      </label>
    </div>
    <br>
    <div>
      <label class="email">Email Address:
        <input type="text">
      </label>
    </div>
    <br>
    <div>
      <label class="fax">Fax No:
        <input type="text">
      </label>
    </div>
  </section>
  <!-- Bio Data -->
  <section class="container-fluid">
    <h1>2. Bio Data.</h1>
    <div class="birth-date">
      <label>Date of Birth:
        <input type="text">
      </label>
    </div>
    <br>
    <div class="nationality">
      <label>Nationality:
        <input type="text">
      </label>
    </div>
    <div>
      <label class="id-no">Id No:
        <input type="text">
      </label>
    </div>
    <br>
  </section>
  <!-- Education background -->
  <section>
    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-12">
          <h1>3. Education Background.</h1>
          <table class="table table-bordered">
            <thead>
              <tr>
                <th scope="col">School</th>
                <th scope="col">Date([Year] to [Year])</th>
                <th scope="col">Certificate Attained.</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th scope="row"></th>
                <td></td>
                <td></td>
                <td></td>
              </tr>
              <tr>
                <th scope="row"></th>
                <td></td>
                <td></td>
                <td></td>
              </tr>
              <tr>
                <th scope="row"></th>
                <td></td>
                <td></td>
                <td></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </section>
</body>

</html>
